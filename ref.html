<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MMM League – Ref (MMM Reffing System)</title>
<style>
  :root{
    --bg:#0a0856;
    --panel:#1b7ed6;
    --accent:#ff5a3a;
    --text:#ffffff;
    --muted:#cbd5e1;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);}
  header{
    height:68px;display:flex;align-items:center;justify-content:center;
    border-bottom:1px solid rgba(255,255,255,0.10);
    background:rgba(0,0,0,0.15);
    position:sticky;top:0;backdrop-filter:blur(6px);z-index:20;
  }
  .nav-inner{
    width:100%;max-width:1200px;padding:10px 20px;box-sizing:border-box;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
  .brand img{height:34px}
  nav{display:flex;gap:16px;align-items:center}
  nav a{color:rgba(255,255,255,0.9);text-decoration:none;font-weight:800;font-size:14px;padding:8px 10px;border-radius:8px}
  nav a.active{color:#2563eb;background:rgba(37,99,235,0.15)}
  .right{color:var(--muted);font-size:14px;white-space:nowrap}
  @media (max-width:900px){nav{display:none}.right{display:none}}

  .page{min-height:calc(100vh - 68px);display:flex;flex-direction:column;}
  .title{text-align:center;font-size:34px;font-weight:900;color:var(--accent);margin:28px 0 10px;}

  .teams-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .select{
    background:#000;color:#fff;border:1px solid rgba(255,255,255,0.15);
    border-radius:8px;padding:10px 12px;min-width:260px;font-weight:800;
  }
  .select label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
  .select select{width:100%;background:#000;color:#fff;border:none;outline:none;font-size:14px;font-weight:800;}

  .arena{width:100%;display:flex;justify-content:center;gap:26px;padding:0 18px 22px;box-sizing:border-box;}
  .divider{width:6px;background:var(--accent);border-radius:4px;opacity:0.9;}
  @media (max-width:900px){.arena{flex-direction:column;align-items:center}.divider{display:none}}

  .panel{
    width:330px;background:var(--panel);border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    padding:14px 16px 16px;box-sizing:border-box;border:2px solid rgba(255,255,255,0.06);
  }
  .panel-top{background:var(--accent);color:#111;font-weight:900;text-align:center;padding:8px 10px;border-radius:6px;margin-bottom:14px;}
  .timer{font-size:54px;font-weight:500;text-align:center;letter-spacing:1px;margin:8px 0 10px;color:#000;}
  .row{display:flex;justify-content:center;gap:12px;margin:10px 0;}
  .btn{background:var(--accent);color:#111;font-weight:900;border:none;border-radius:6px;padding:10px 18px;cursor:pointer;}
  .btn.secondary{background:rgba(255,255,255,0.14);color:#fff}
  .score-controls{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:6px;}
  .arrow{width:76px;padding:12px 0;font-size:18px;}
  .score{font-size:22px;font-weight:900;color:var(--accent);}
  .score-label{color:#000;font-size:14px;margin-top:-4px}
  .penalty-btn{width:100%;margin-top:14px;padding:14px 12px;border-radius:8px;font-size:22px;}
  .logbox{margin-top:14px;background:#101010;border-radius:6px;height:48px;border:2px solid rgba(0,0,0,0.35);}

  .bottom-controls{display:flex;justify-content:center;margin:8px 0 10px;}
  .reset-all{background:var(--accent);color:#111;font-weight:900;border:none;border-radius:6px;padding:10px 16px;cursor:pointer;}

  .biglog{width:100%;max-width:1060px;margin:12px auto 0;padding:0 18px 24px;box-sizing:border-box;}
  .biglog-inner{
    background:#0b0b0b;border:1px solid rgba(255,255,255,0.10);border-radius:10px;
    padding:12px;height:140px;overflow:auto;
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:13px;line-height:1.45;color:#d1d5db;white-space:pre-wrap;
  }

  footer{
    margin-top:auto;display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;color:#fff;font-size:13px;background:rgba(0,0,0,0.15);
    border-top:1px solid rgba(255,255,255,0.10);
  }
  .madeby a{color:#60a5fa;text-decoration:none;font-weight:900}
  .madeby a:hover{text-decoration:underline}
  .mmm-logo{height:24px;width:auto;display:block;opacity:0.9}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.65);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px;box-sizing:border-box;
  }
  .modal{
    width:520px;max-width:100%;background:#0b1020;border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }
  .modal h3{margin:0 0 10px;color:#fff}
  .modal .muted{color:var(--muted);font-size:13px;margin:0 0 10px}
  .modal select{
    width:100%;padding:10px 12px;border-radius:10px;background:#000;border:1px solid rgba(255,255,255,0.12);
    color:#fff;font-weight:800;margin-bottom:10px;outline:none;
  }
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <img src="MMM logo.png" alt="MMM logo">
      <b>MMM League</b>
    </a>

<nav>
  <a href="/">Home</a>
  <a href="/teams">Teams</a>
  <a href="/content">Content</a>
  <a href="/rules">Rules</a>
  <a href="/standings">Standings</a>
  <a class="active" href="/ref">Blue</a>
</nav>


    <div class="right">MMM Reffing System</div>
  </div>
</header>

<div class="page">
  <div class="title">MMM Reffing System</div>

  <div class="teams-row">
    <div class="select">
      <label>Team 1</label>
      <select id="team1Select"></select>
    </div>
    <div class="select">
      <label>Team 2</label>
      <select id="team2Select"></select>
    </div>
  </div>

  <div class="arena">
    <div class="panel">
      <div class="panel-top" id="panel1Title">Timer 1</div>
      <div class="timer" id="timer1">-00:10.00</div>
      <div class="row">
        <button class="btn" id="t1Start">Start</button>
        <button class="btn" id="t1Stop">Stop</button>
        <button class="btn" id="t1Reset">Reset</button>
      </div>

      <div class="score-controls">
        <button class="btn arrow" id="t1ScoreUp">▲</button>
        <div class="score" id="score1">0</div>
        <div class="score-label">Score</div>
        <button class="btn arrow" id="t1ScoreDown">▼</button>
      </div>

      <button class="btn penalty-btn" id="penalty1Btn">Penalty Menu</button>
      <div class="logbox"></div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <div class="panel-top" id="panel2Title">Timer 2</div>
      <div class="timer" id="timer2">-00:10.00</div>
      <div class="row">
        <button class="btn" id="t2Start">Start</button>
        <button class="btn" id="t2Stop">Stop</button>
        <button class="btn" id="t2Reset">Reset</button>
      </div>

      <div class="score-controls">
        <button class="btn arrow" id="t2ScoreUp">▲</button>
        <div class="score" id="score2">0</div>
        <div class="score-label">Score</div>
        <button class="btn arrow" id="t2ScoreDown">▼</button>
      </div>

      <button class="btn penalty-btn" id="penalty2Btn">Penalty Menu</button>
      <div class="logbox"></div>
    </div>
  </div>

  <div class="bottom-controls">
    <button class="reset-all" id="resetAll">Reset All Timers</button>
  </div>

  <div class="biglog">
    <div class="biglog-inner" id="eventLog"></div>
  </div>

  <footer>
    <div class="madeby">
      Made by
      <a href="discord://-/users/1101643714033623120">1101643714033623120</a>
      <span style="color:var(--muted);font-weight:700;">(if it doesn't open, use</span>
      <a href="https://discord.com/users/1101643714033623120" target="_blank" rel="noopener">web</a>
      <span style="color:var(--muted);font-weight:700;">)</span>
    </div>
    <img class="mmm-logo" src="MMM logo.png" alt="MMM Logo">
  </footer>
</div>

<!-- Penalty Modal -->
<div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h3 id="modalTitle">Penalty Menu</h3>
    <p class="muted">Submit a penalty for the selected team.</p>

    <select id="penaltyType"></select>
    <select id="penaltyResult">
      <option value="Warning">Warning</option>
    </select>

    <div class="modal-actions">
      <button class="btn secondary" id="modalCancel">Cancel</button>
      <button class="btn" id="modalSubmit">Submit</button>
    </div>
  </div>
</div>

<script>
  // ------- CONFIG -------
  const API_BASE = "https://mmm-transactions-bot-v2-production.up.railway.app";
  const TEAMS_API_URL = API_BASE + "/teams";
  const TIMER_LIMIT_MS = 4 * 60 * 1000; // 4:00 auto stop
  const COUNTDOWN_MS = 10 * 1000;      // 10s pre-countdown
  const SCORE_MAX = 5;

  const PENALTIES = [
    { group: "Game Progression", items: ["Stalling"] },
    { group: "Prohibited Tactics", items: [
      "Hiding",
      "Lagging (Refuses to leave)",
      "DC Flicking",
      "Using In-Game Camera",
      "PSA / Crouch Jumping / Rec Room Glitch",
      "Update Features",
      "Using Fishlegs",
      "Using Illegal Hz Options"
    ]},
    { group: "Subbing Rules", items: [
      "Using Banned Players in Unofficial Scrim",
      "Using Subs Off Team"
    ]}
  ];

  let scoreReported = false;

  function nowStamp(){
    const d = new Date();
    return "[" + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit", second:"2-digit" }) + "]";
  }
  function logLine(text){
    const el = document.getElementById("eventLog");
    el.textContent += text + "\n";
    el.scrollTop = el.scrollHeight;
  }

  // ------- TEAMS dropdowns (auto from /teams) -------
  async function loadTeams(){
    const t1 = document.getElementById("team1Select");
    const t2 = document.getElementById("team2Select");
    t1.innerHTML = "";
    t2.innerHTML = "";

    const p1 = document.createElement("option");
    p1.value = ""; p1.textContent = "Select Team 1…";
    t1.appendChild(p1);

    const p2 = document.createElement("option");
    p2.value = ""; p2.textContent = "Select Team 2…";
    t2.appendChild(p2);

    try{
      const res = await fetch(TEAMS_API_URL);
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const teams = (data.teams || []).slice().sort((a,b)=>a.name.localeCompare(b.name));

      teams.forEach(team=>{
        const o1 = document.createElement("option");
        o1.value = team.name; o1.textContent = team.name;
        t1.appendChild(o1);

        const o2 = document.createElement("option");
        o2.value = team.name; o2.textContent = team.name;
        t2.appendChild(o2);
      });
    }catch(e){
      console.error(e);
      logLine(nowStamp() + " Failed to load teams.");
    }

    updatePanelTitles();
  }
  loadTeams();
  setInterval(loadTeams, 60000);

  function getTeamName(idx){
    const sel = document.getElementById(idx===1 ? "team1Select" : "team2Select");
    return sel.value || ("Team " + idx);
  }

  function updatePanelTitles(){
    const p1 = document.getElementById("panel1Title");
    const p2 = document.getElementById("panel2Title");
    if (p1) p1.textContent = getTeamName(1);
    if (p2) p2.textContent = getTeamName(2);
  }

  document.getElementById("team1Select").addEventListener("change", ()=>{
    updatePanelTitles();
    scoreReported = false; // new matchup -> allow new auto-report
  });
  document.getElementById("team2Select").addEventListener("change", ()=>{
    updatePanelTitles();
    scoreReported = false;
  });

  // ------- SCORE -------
  function clampScore(n){ return Math.max(0, Math.min(SCORE_MAX, n)); }
  function setScore(idx, val){
    document.getElementById(idx===1 ? "score1" : "score2").textContent = String(clampScore(val));
  }
  function getScore(idx){
    return parseInt(document.getElementById(idx===1 ? "score1" : "score2").textContent || "0", 10) || 0;
  }

  function maybeAutoReportScore(){
    if (scoreReported) return;

    const s1 = getScore(1);
    const s2 = getScore(2);

    // Only trigger when someone reaches SCORE_MAX and it's not a tie
    if ((s1 === SCORE_MAX || s2 === SCORE_MAX) && s1 !== s2) {
      scoreReported = true;

      const team1 = getTeamName(1);
      const team2 = getTeamName(2);
      const payload = {
        team1,
        team2,
        score1: s1,
        score2: s2
      };

      fetch(API_BASE + "/report_score", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(res=>{
        if (!res.ok) throw new Error("HTTP " + res.status);
        logLine(nowStamp() + ` Auto-reported score: ${team1} vs ${team2} (${s1}-${s2})`);
      }).catch(err=>{
        console.error(err);
        logLine(nowStamp() + " Failed to auto-report score.");
        scoreReported = false; // allow retry
      });
    }
  }

  document.getElementById("t1ScoreUp").onclick = ()=>{
    setScore(1, getScore(1)+1);
    maybeAutoReportScore();
  };
  document.getElementById("t1ScoreDown").onclick = ()=>{
    setScore(1, getScore(1)-1);
    maybeAutoReportScore();
  };
  document.getElementById("t2ScoreUp").onclick = ()=>{
    setScore(2, getScore(2)+1);
    maybeAutoReportScore();
  };
  document.getElementById("t2ScoreDown").onclick = ()=>{
    setScore(2, getScore(2)-1);
    maybeAutoReportScore();
  };

  // ------- TIMER with 10s countdown then up to 4:00 -------
  function formatSigned(ms) {
    const sign = ms < 0 ? "-" : "";
    const abs = Math.abs(ms);
    const m = Math.floor(abs / 60000);
    const s = Math.floor((abs % 60000) / 1000);
    const cs = Math.floor((abs % 1000) / 10);
    return (
      sign +
      String(m).padStart(2,"0") + ":" +
      String(s).padStart(2,"0") + "." +
      String(cs).padStart(2,"0")
    );
  }

  function makeTimer(displayEl, label) {
    let running = false;
    let raf = null;

    let elapsedReal = 0;
    let countdownRemaining = COUNTDOWN_MS;
    let startAt = 0;

    function setDisplay() {
      if (countdownRemaining > 0) {
        displayEl.textContent = formatSigned(-countdownRemaining);
      } else {
        displayEl.textContent = formatSigned(elapsedReal);
      }
    }

    function stopInternal() {
      running = false;
      if (raf) cancelAnimationFrame(raf);
      raf = null;
    }

    function tick() {
      if (!running) return;
      const now = performance.now();
      const dt = now - startAt;

      if (countdownRemaining > 0) {
        let remaining = COUNTDOWN_MS - dt;
        if (remaining <= 0) {
          countdownRemaining = 0;
          elapsedReal = 0;
          startAt = performance.now();
          setDisplay();
          raf = requestAnimationFrame(tick);
          return;
        } else {
          countdownRemaining = remaining;
          setDisplay();
          raf = requestAnimationFrame(tick);
          return;
        }
      }

      elapsedReal = dt;
      if (elapsedReal >= TIMER_LIMIT_MS) {
        elapsedReal = TIMER_LIMIT_MS;
        setDisplay();
        stopInternal();
        logLine(nowStamp() + " " + label + " auto-stopped at 4:00.");
        return;
      }
      setDisplay();
      raf = requestAnimationFrame(tick);
    }

    function start() {
      if (running) return;
      running = true;
      if (countdownRemaining > 0) {
        startAt = performance.now() - (COUNTDOWN_MS - countdownRemaining);
      } else {
        startAt = performance.now() - elapsedReal;
      }
      raf = requestAnimationFrame(tick);
    }

    function stop() {
      if (!running) return;
      const now = performance.now();
      if (countdownRemaining > 0) {
        const dt = now - startAt;
        countdownRemaining = Math.max(0, COUNTDOWN_MS - dt);
      } else {
        elapsedReal = Math.min(TIMER_LIMIT_MS, now - startAt);
      }
      stopInternal();
      setDisplay();
    }

    function reset() {
      stopInternal();
      elapsedReal = 0;
      countdownRemaining = COUNTDOWN_MS;
      setDisplay();
    }

    setDisplay();

    return { start, stop, reset };
  }

  const timer1 = makeTimer(document.getElementById("timer1"), "Timer 1");
  const timer2 = makeTimer(document.getElementById("timer2"), "Timer 2");

  document.getElementById("t1Start").onclick = ()=> timer1.start();
  document.getElementById("t1Stop").onclick  = ()=> timer1.stop();
  document.getElementById("t1Reset").onclick = ()=> timer1.reset();
  document.getElementById("t2Start").onclick = ()=> timer2.start();
  document.getElementById("t2Stop").onclick  = ()=> timer2.stop();
  document.getElementById("t2Reset").onclick = ()=> timer2.reset();

  document.getElementById("resetAll").onclick = ()=>{
    timer1.reset();
    timer2.reset();
    scoreReported = false;
    logLine(nowStamp() + " Reset all timers.");
  };

  // ------- PENALTY MODAL -------
  const modal = document.getElementById("modalBackdrop");
  const penaltyType = document.getElementById("penaltyType");
  const penaltyResult = document.getElementById("penaltyResult");

  function populatePenaltyDropdown(){
    penaltyType.innerHTML = "";
    PENALTIES.forEach(group=>{
      const og = document.createElement("optgroup");
      og.label = group.group;
      group.items.forEach(item=>{
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        og.appendChild(opt);
      });
      penaltyType.appendChild(og);
    });
  }
  populatePenaltyDropdown();

  let activeTeamIndex = 1;
  function openPenalty(teamIdx){
    activeTeamIndex = teamIdx;
    document.getElementById("modalTitle").textContent =
      "Penalty Menu (" + getTeamName(teamIdx) + ")";
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden","false");
  }
  function closePenalty(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden","true");
  }

  document.getElementById("penalty1Btn").onclick = ()=> openPenalty(1);
  document.getElementById("penalty2Btn").onclick = ()=> openPenalty(2);
  document.getElementById("modalCancel").onclick = closePenalty;
  modal.addEventListener("click", (e)=>{ if(e.target===modal) closePenalty(); });

  const warnings = {1:0,2:0};

  function addPointToOther(teamIdx){
    const other = teamIdx===1 ? 2 : 1;
    setScore(other, getScore(other)+1);
    maybeAutoReportScore();
    logLine(nowStamp() + " AUTO POINT: " + getTeamName(other) + " +1 (opponent hit 3 warnings)");
  }

  document.getElementById("modalSubmit").onclick = ()=>{
    const p = penaltyType.value || "Unknown";
    const result = penaltyResult.value || "Warning";

    warnings[activeTeamIndex] += 1;
    const n = warnings[activeTeamIndex];

    logLine(`${nowStamp()} ${getTeamName(activeTeamIndex)} offense #${n} for ${p}: ${result}`);

    if(warnings[activeTeamIndex] >= 3){
      addPointToOther(activeTeamIndex);
      // warnings do NOT reset anymore
      logLine(nowStamp() + " AUTO POINT given to " + getTeamName(activeTeamIndex === 1 ? 2 : 1) +
              " (opponent has " + warnings[activeTeamIndex] + " warnings).");
    }

    closePenalty();
  };

  // initial log
  logLine(nowStamp() + " Ref tool loaded. Score max 5. Timers auto-stop at 4:00 with a 10s pre-countdown. Scores auto-post to Discord when a team hits 5.");
</script>
</body>
</html>
